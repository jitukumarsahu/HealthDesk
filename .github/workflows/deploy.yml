name: HealthDesk CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Test Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    # 1. Backend Validation
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci
      
    - name: Compile Backend TypeScript
      run: |
        cd backend
        npm run build

    # 2. Frontend Validation
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Compile Next.js Frontend
      run: |
        cd frontend
        npm run build

  build-and-deploy:
    name: Build, Register & Deploy to AWS
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Build and Push Backend
    - name: Build & Push Backend Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: healthdesk-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # Build and Push Frontend
    - name: Build & Push Frontend Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: healthdesk-frontend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # Retrieve Secrets from SSM Parameter Store & Deploy ECS Task Definition
    - name: Deploy to Amazon ECS (Rolling Deploy)
      id: deploy-ecs
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: aws/task-definition.json
        service: healthdesk-prod-service
        cluster: healthdesk-production-cluster
        wait-for-service-stability: true
        # Wait up to 10 minutes for rolling stability validation. 
        # If it fails, action fails and ECS automatically rolls back.

    # Post Deployment Health Verification Check
    - name: Post-Release Health Verification
      run: |
        echo "Running service health checks..."
        STATUS_CODE=$(curl --write-out "%{http_code}" --silent --output /dev/null "http://${{ secrets.AWS_LOAD_BALANCER_DNS }}/health")
        if [ "$STATUS_CODE" -ne 200 ]; then
          echo "Health check failed with status $STATUS_CODE. Triggering service rollback..."
          exit 1
        else
          echo "Service is healthy and stable!"
        fi
